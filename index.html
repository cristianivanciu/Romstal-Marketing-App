function downloadAppsScript() {
  const code = `// ============================================================
// Romstal Marketing - Google Apps Script Database
// Instrucțiuni: paste în Extensions > Apps Script din Google Sheets
// Deploy: New deployment > Web App > Execute as: Me, Access: Anyone
// IMPORTANT după orice modificare: Deploy > Manage deployments > Edit > New version > Deploy
// ============================================================

const SHEET_NAME = 'Database';
const PROJECTS_SHEET = 'Proiecte';

// ── Helpers dată săptămână ──────────────────────────────────────────────────
var RO_MONTHS_AS = {ian:0,ianuarie:0,feb:1,februarie:1,mar:2,martie:2,apr:3,aprilie:3,
  mai:4,iun:5,iunie:5,iul:6,iulie:6,aug:7,august:7,sep:8,septembrie:8,
  oct:9,octombrie:9,nov:10,noiembrie:10,dec:11,decembrie:11};
function parseWeekDateAS(name) {
  var s = (name || '').toLowerCase();
  var yr = 2026;
  var yrM = s.match(/\b(20\d\d)\b/); if (yrM) yr = parseInt(yrM[1]);
  var mo = 0;
  var keys = Object.keys(RO_MONTHS_AS).sort(function(a,b){return b.length-a.length;});
  for (var i=0;i<keys.length;i++) { if (s.indexOf(keys[i]) !== -1) { mo = RO_MONTHS_AS[keys[i]]; break; } }
  var dayM = s.match(/\b(\d{1,2})\b/); var day = dayM ? parseInt(dayM[1]) : 1;
  return new Date(yr, mo, day).getTime();
}

// ── Helpers status ─────────────────────────────────────────────────────────
function isAprobat(status) {
  var s = (status || '').toLowerCase().trim();
  return s === 'aprobat' || s.indexOf('aprobat ') === 0 || s === 'da';
}
function isRespins(status) {
  var s = (status || '').toLowerCase().trim();
  return s === 'respins' || s.indexOf('respins ') === 0 || s === 'nu';
}

// ── doGet: returnează datele pentru sync ───────────────────────────────────
function doGet(e) {
  try {
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sheet = ss.getSheetByName(SHEET_NAME);
    if (!sheet) {
      sheet = ss.insertSheet(SHEET_NAME);
      return jsonOk({ weeks: [], users: ['Admin','Marketing','Finante'] });
    }
    const lastRow = sheet.getLastRow();
    if (lastRow === 0) return jsonOk({ weeks: [], users: ['Admin','Marketing','Finante'] });

    const data = sheet.getRange(1, 1, lastRow, 2).getValues();
    const weeks = [];
    let users = ['Admin','Marketing','Finante'];
    let deletedIds = [];

    for (const row of data) {
      if (row[0] === '__USERS__') {
        try { users = JSON.parse(row[1]); } catch(err) {}
      } else if (row[0] === '__DELETED_IDS__') {
        try { deletedIds = JSON.parse(row[1]); } catch(err) {}
      } else if (row[0] && row[1]) {
        try { weeks.push(JSON.parse(row[1])); } catch(err) {}
      }
    }
    return jsonOk({ weeks, users, deletedIds });
  } catch(err) {
    return jsonOk({ error: err.toString() });
  }
}

// ── doPost: salvează datele din aplicație ─────────────────────────────────
function doPost(e) {
  const lock = LockService.getScriptLock();
  try {
    // waitLock aruncă excepție dacă nu poate obține lock-ul în 30s — nu continuăm fără lock
    lock.waitLock(30000);
  } catch(lockErr) {
    return jsonOk({ error: 'Server ocupat (lock timeout). Încearcă din nou.' });
  }
  let proiecteCount = 0;
  try {
    const payload = JSON.parse(e.postData.contents);
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const isReset = payload.mode === 'reset';

    // Tombstone server-side: combinăm deletedIds din payload cu cele stocate în Sheets
    let serverDeletedIds = [];
    if (!isReset) {
      const existingSheet = ss.getSheetByName(SHEET_NAME);
      if (existingSheet && existingSheet.getLastRow() > 0) {
        const existingRows = existingSheet.getRange(1, 1, existingSheet.getLastRow(), 2).getValues();
        for (const row of existingRows) {
          if (row[0] === '__DELETED_IDS__') {
            try { serverDeletedIds = JSON.parse(row[1]); } catch(err) {}
            break;
          }
        }
      }
    }
    const allDeletedIds = isReset ? [] : [...new Set([...serverDeletedIds, ...(payload.deletedIds || [])])];
    const deletedSet = new Set(allDeletedIds);

    // 1. Determină săptămânile finale (merge sau reset)
    let finalWeeks = payload.weeks || [];

    if (!isReset) {
      let sheet = ss.getSheetByName(SHEET_NAME);
      if (sheet && sheet.getLastRow() > 0) {
        const existingData = sheet.getRange(1, 1, sheet.getLastRow(), 2).getValues();
        const existingMap = {};
        for (const row of existingData) {
          if (row[0] && row[0] !== '__USERS__' && row[0] !== '__DELETED_IDS__' && row[1]) {
            try { const w = JSON.parse(row[1]); existingMap[w.week] = w; } catch(err) {}
          }
        }
        const mergedMap = Object.assign({}, existingMap);
        for (const week of finalWeeks) {
          if (!mergedMap[week.week]) {
            mergedMap[week.week] = week;
          } else {
            const rowMap = {};
            for (const r of (mergedMap[week.week].rows || [])) {
              if (r._id && !deletedSet.has(r._id)) rowMap[r._id] = r;
            }
            for (const r of (week.rows || [])) {
              if (!r._id || deletedSet.has(r._id)) continue;
              const ex = rowMap[r._id];
              const inTs = r._updatedAt || r._statusChangedAt || r._createdAt || '';
              const exTs = ex ? (ex._updatedAt || ex._statusChangedAt || ex._createdAt || '') : '';
              if (!ex || inTs >= exTs) rowMap[r._id] = r;
            }
            mergedMap[week.week] = { ...mergedMap[week.week], rows: Object.values(rowMap) };
          }
        }
        finalWeeks = Object.values(mergedMap);
      }
    }

    // 2. Salvează JSON în tab-ul Database (secțiunea critică — sub lock)
    let sheet = ss.getSheetByName(SHEET_NAME) || ss.insertSheet(SHEET_NAME);
    sheet.clearContents();
    const rows = [
      ['__USERS__', JSON.stringify(payload.users || [])],
      ['__DELETED_IDS__', JSON.stringify(allDeletedIds)]
    ];
    for (const week of finalWeeks) {
      rows.push([week.week || '', JSON.stringify(week)]);
    }
    if (rows.length > 0) sheet.getRange(1, 1, rows.length, 2).setValues(rows);
    SpreadsheetApp.flush(); // Asigurăm că scrierile critice sunt comise înainte de a elibera lock-ul
    lock.releaseLock();     // Eliberăm lock-ul cât mai devreme — tab Proiecte e lent și nu e critic

    // 3. Scrie tab-ul Proiecte — batch (un singur setValues + setBackgrounds, nu rând cu rând)
    const headers = ['Săptămână','Nr Crt','Data Solicitare','Categorie','Denumire Proiect',
      'Centru Descarcare','Regiune','Solicitant','Perioada','Buget (€ fara TVA)',
      'Segment','Tip Obiectiv','Nr Participanti','Obiectiv Vanzare (€)','ROI',
      'Explicatii Obiectiv','Observatii','Status','Adaugat De','Adaugat La'];
    // Sortăm cel mai nou primul — fiecare proiect apare sub săptămâna cea mai recentă
    const weeksForProiecte = [...finalWeeks].sort(function(a,b){
      return parseWeekDateAS(b.week) - parseWeekDateAS(a.week);
    });
    const dataRows = [];
    const bgColors = [];
    const seenIds = new Set(); // dedup: fiecare _id apare o singură dată în Proiecte
    for (const week of weeksForProiecte) {
      for (const r of (week.rows || [])) {
        if (r._id) {
          if (seenIds.has(r._id)) continue;
          seenIds.add(r._id);
        }
        const status = r['Status'] || r['Aprobare (notite Andu din sedinta cu dl Perini)'] || '';
        dataRows.push([
          week.week || '', r['Nr crt'] || '', r['Data solicitare'] || '',
          r['Categorie proiect'] || '', r['Denumire Proiect'] || r['Denumire'] || '',
          r['Centru descarcare'] || '', r['Regiune'] || '', r['Solicitant'] || '',
          r['Perioada'] || '', r['Buget (euro fara TVA)'] || '', r['Segment'] || '',
          r['Tip obiectoiv'] || '', r['nr participanti'] || '',
          r['obiectiv vanzare suplimentara'] || '', r['ROI'] || '',
          r['Explicatii Obiectiv'] || '', r['Observatii'] || '', status,
          r['_createdBy'] || '',
          r['_createdAt'] ? r['_createdAt'].substring(0,10) : ''
        ]);
        const color = isAprobat(status) ? '#d9ead3' : isRespins(status) ? '#fce8e6' : '#ffffff';
        bgColors.push(Array(headers.length).fill(color));
      }
    }
    let ps = ss.getSheetByName(PROJECTS_SHEET) || ss.insertSheet(PROJECTS_SHEET);
    ps.clearContents();
    ps.getRange(1, 1, 1, headers.length).setValues([headers])
      .setBackground('#1a3a6b').setFontColor('#ffffff').setFontWeight('bold');
    if (dataRows.length > 0) {
      ps.getRange(2, 1, dataRows.length, headers.length).setValues(dataRows);
      ps.getRange(2, 1, dataRows.length, headers.length).setBackgrounds(bgColors);
    }
    ps.setFrozenRows(1);
    ps.setColumnWidth(1, 180);
    ps.setColumnWidth(5, 250);
    proiecteCount = dataRows.length;

    // 4. Scrie tab-ul Buget Marketing
    writeBugetSummary(ss, payload.bugetSummary);

    return jsonOk({ ok: true, mode: isReset ? 'reset' : 'merge', weeks: rows.length - 1, proiecte: proiecteCount });
  } catch(err) {
    try { lock.releaseLock(); } catch(e2) {}
    return jsonOk({ error: err.toString() });
  }
}

// ── writeBugetSummary: tab cu indicatorii bugetului anual ─────────────────
function writeBugetSummary(ss, summary) {
  if (!summary) return;
  var sheetName = 'Buget Marketing ' + summary.an;
  var sh = ss.getSheetByName(sheetName);
  if (!sh) sh = ss.insertSheet(sheetName);
  sh.clearContents();

  sh.getRange(1,1,1,2).setValues([['Indicator','Valoare']]);
  sh.getRange(1,1,1,2).setFontWeight('bold').setBackground('#1a3a6b').setFontColor('#ffffff');

  var fmt = function(n) {
    return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  };

  var rows = [
    ['Buget anual alocat (€)',  fmt(summary.bugetAnualAlocat)],
    ['Total solicitat (€)',      fmt(summary.totalSolicitat)],
    ['Buget aprobat (€)',        fmt(summary.bugetAprobat)],
    ['Buget în analiză (€)', fmt(summary.bugetInAnaliza)],
    ['Disponibil rămas (€)', fmt(summary.disponibil)],
    ['% din bugetul anual',           summary.pctDinBugetAnual + '%'],
    ['Nr. proiecte total',            summary.nrProiecteTotal],
    ['Nr. proiecte aprobate',         summary.nrProiecteAprobate],
    ['Rată aprobare (%)',        summary.rataAprobare + '%'],
    ['Data actualizării',        summary.dataActualizare]
  ];

  sh.getRange(2,1,rows.length,2).setValues(rows);
  sh.setColumnWidth(1, 240);
  sh.setColumnWidth(2, 180);

  for (var i = 0; i < rows.length; i++) {
    sh.getRange(i+2,1,1,2).setBackground(i % 2 === 0 ? '#f0f4ff' : '#ffffff');
  }
  sh.getRange(3,2).setFontColor('#16a34a').setFontWeight('bold');
  sh.getRange(5,2).setFontColor(summary.disponibil > 0 ? '#16a34a' : '#dc2626').setFontWeight('bold');
}

// ── jsonOk: helper răspuns JSON ────────────────────────────────────────────
function jsonOk(obj) {
  const out = ContentService.createTextOutput(JSON.stringify(obj));
  out.setMimeType(ContentService.MimeType.JSON);
  return out;
}`;

  const blob = new Blob([code], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'apps-script.gs'; a.click();
  URL.revokeObjectURL(url);
}
