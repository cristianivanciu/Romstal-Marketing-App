<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romstal Marketing - Gestiune Proiecte</title>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
.lucide{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle;flex-shrink:0}
.lucide-lg{width:20px;height:20px}
.lucide-xl{width:24px;height:24px}
.lucide-2xl{width:32px;height:32px}
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a56db;--blue-dark:#1a3a6b;--blue-light:#e8f0fd;
  --red:#dc2626;--red-light:#fef2f2;
  --green:#16a34a;--green-light:#f0fdf4;--orange:#ea580c;--amber:#f59e0b;
  --gray-50:#f4f6fa;--gray-100:#f0f2f7;--gray-200:#e2e6ef;
  --gray-300:#cdd3df;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#0f1f3d;
  --shadow:0 2px 8px rgba(15,31,61,.08),0 1px 3px rgba(0,0,0,.06);
  --shadow-lg:0 12px 28px rgba(15,31,61,.12),0 4px 8px rgba(0,0,0,.06);
  --shadow-card:0 2px 10px rgba(15,31,61,.07),0 1px 3px rgba(0,0,0,.05);
  --radius:10px;
}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:#eef1f8;color:var(--gray-900);min-height:100vh;font-size:14px}
/* LAYOUT */
#app{display:flex;flex-direction:column;min-height:100vh}
#header{background:linear-gradient(135deg,#0d2456 0%,#1a3a6b 50%,#1a56db 100%);color:#fff;padding:0 24px;height:62px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(13,36,86,.35)}
#header .logo{font-size:20px;font-weight:800;letter-spacing:-.2px;white-space:nowrap}
#header .logo span{color:#7dd3fc;font-weight:400}
#header nav{display:flex;gap:4px;flex:1}
#header nav button{background:transparent;border:none;color:rgba(255,255,255,.75);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s;letter-spacing:.1px}
#header nav button:hover{background:rgba(255,255,255,.15);color:#fff}
#header nav button.active{background:rgba(255,255,255,.22);color:#fff;font-weight:600}
#header .user-area{display:flex;align-items:center;gap:10px;margin-left:auto}
#header .user-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:248px;background:#fff;border-right:1px solid var(--gray-200);overflow-y:auto;padding:14px 10px;flex-shrink:0;box-shadow:2px 0 8px rgba(15,31,61,.04)}
#sidebar h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gray-500);padding:8px 8px 6px}
#sidebar .week-btn{display:block;width:100%;text-align:left;background:none;border:none;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;color:var(--gray-700);transition:.15s;line-height:1.4;border-left:3px solid transparent}
#sidebar .week-btn:hover{background:var(--gray-100);border-left-color:var(--gray-300)}
#sidebar .week-btn.active{background:var(--blue-light);color:var(--blue-dark);font-weight:700;border-left-color:var(--blue)}
#sidebar .week-count{float:right;background:var(--gray-200);color:var(--gray-500);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600}
#sidebar .week-btn.active .week-count{background:var(--blue);color:#fff}
#content{flex:1;overflow-y:auto;padding:24px}
/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.toolbar h2{font-size:20px;font-weight:800;flex:1;color:var(--gray-900);letter-spacing:-.02em}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.3)}.btn-primary:hover{background:linear-gradient(135deg,#163264,#1648c0);box-shadow:0 4px 12px rgba(26,86,219,.4);transform:translateY(-1px)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#15803d}
.btn-ghost{background:#fff;color:var(--gray-700);border:1px solid var(--gray-200);box-shadow:var(--shadow-card)}.btn-ghost:hover{background:var(--gray-50);border-color:var(--gray-300)}
.btn-sm{padding:5px 10px;font-size:12px}
.search-box{position:relative}.search-box input{padding:8px 12px 8px 34px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;width:220px;background:#fff;box-shadow:var(--shadow-card)}
.search-box input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.12)}
.search-box::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px}
/* PROJECTS HEADER */
.projects-header{background:#fff;border-radius:16px;box-shadow:var(--shadow-card);margin-bottom:20px;overflow:hidden;border:1px solid var(--gray-200)}
.ph-top{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;gap:16px;flex-wrap:wrap}
.ph-title{display:flex;flex-direction:column;gap:8px;flex:1;min-width:0}
.ph-title h2{font-size:20px;font-weight:800;color:#0d2050;letter-spacing:-.02em;margin:0}
.ph-stats{display:flex;gap:8px;flex-wrap:wrap}
.ph-stat{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.ph-stat.blue{background:var(--blue-light);color:var(--blue-dark)}
.ph-stat.red{background:#fef2f2;color:#b91c1c}
.ph-stat.green{background:#f0fdf4;color:#15803d}
.ph-stat.amber{background:#fffbeb;color:#92400e}
.ph-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ph-filters{display:flex;align-items:center;gap:8px;padding:12px 24px;background:#f8faff;border-top:1px solid var(--gray-200);flex-wrap:wrap}
.ph-filter-label{font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:5px;white-space:nowrap;margin-right:4px}
.ph-filters select{padding:6px 28px 6px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:12px;background:#fff;color:var(--gray-700);cursor:pointer;font-weight:600;appearance:auto;transition:.15s;max-width:160px}
.ph-filters select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.ph-filters select:hover{border-color:var(--gray-300);background:#f9fafb}
.ph-divider{width:1px;height:24px;background:var(--gray-200);margin:0 4px}
.ph-reset{background:none;border:1px dashed var(--gray-300);color:var(--gray-500);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s}
.ph-reset:hover{border-color:var(--red);color:var(--red);background:#fef2f2}
/* STATS BAR */
.stats-bar{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.ph-statcards{display:flex;gap:12px;padding:0 24px 20px;flex-wrap:wrap}
.stat-card{background:#fff;border:1px solid var(--gray-200);border-radius:12px;padding:14px 16px;display:flex;flex-direction:row;align-items:center;gap:14px;min-width:130px;box-shadow:var(--shadow-card);transition:.2s}
.stat-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.stat-card .sc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-card .sc-icon .lucide{width:22px;height:22px}
.stat-card .sc-body{display:flex;flex-direction:column;gap:2px}
.stat-card .val{font-size:24px;font-weight:800;color:var(--gray-900);letter-spacing:-.5px;line-height:1}
.stat-card .lbl{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px}
.stat-card.blue{border-top:3px solid var(--blue)}.stat-card.blue .sc-icon{background:var(--blue-light);color:var(--blue)}
.stat-card.red{border-top:3px solid var(--red)}.stat-card.red .sc-icon{background:#fef2f2;color:var(--red)}
.stat-card.green{border-top:3px solid var(--green)}.stat-card.green .sc-icon{background:#f0fdf4;color:var(--green)}
.stat-card.orange{border-top:3px solid var(--amber)}.stat-card.orange .sc-icon{background:#fffbeb;color:var(--amber)}
/* TABLE */
.table-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead{background:var(--gray-50)}
th{padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:var(--gray-500);border-bottom:2px solid var(--gray-200);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--gray-100);vertical-align:top;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}
/* RED VISIBLE FIELDS */
.field-red{color:var(--red);font-weight:600}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.2px}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-blue{background:var(--blue-light);color:var(--blue-dark)}
.badge-gray{background:var(--gray-100);color:var(--gray-500)}
.badge-orange{background:#fff7ed;color:#c2410c}
/* PROJECT CARD */
.project-card{background:#fff;border:1px solid var(--gray-200);border-left:4px solid var(--gray-300);border-radius:var(--radius);margin-bottom:14px;box-shadow:var(--shadow-card);overflow:hidden;transition:box-shadow .2s,transform .15s}
.project-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.project-card[data-status="approved"]{border-left-color:var(--green)}
.project-card[data-status="rejected"]{border-left-color:var(--red)}
.project-card[data-status="pending"]{border-left-color:var(--amber)}
.card-header{padding:16px 18px 14px;display:flex;align-items:flex-start;gap:14px;background:linear-gradient(180deg,#fafbff 0%,#fff 100%)}
.card-num{background:linear-gradient(160deg,#0d2456 0%,#1a56db 100%);color:#fff;border-radius:12px;width:44px;height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;flex-shrink:0;box-shadow:0 4px 12px rgba(26,86,219,.4);position:relative;overflow:hidden}
.card-num::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 60%)}
.card-num-hash{font-size:9px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.5px;line-height:1;text-transform:uppercase}
.card-num-val{font-size:18px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.5px}
.card-main{flex:1}
.card-title{font-size:17px;font-weight:800;color:#0d2050;margin-bottom:8px;line-height:1.35;letter-spacing:-.01em}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
/* RED FIELDS ROW - always visible */
.red-fields{display:flex;gap:8px;padding:12px 18px 16px;flex-wrap:wrap;border-top:1px solid var(--gray-200);background:#f8faff}
.red-field{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:8px 13px;flex:1;min-width:130px;max-width:220px;transition:.15s}
.red-field:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:var(--blue-light)}
.rf-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rf-icon .lucide{width:15px;height:15px}
.rf-body{display:flex;flex-direction:column;gap:2px;min-width:0}
.rf-label{font-size:9px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
.rf-value{font-size:14px;font-weight:800;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* BLUE FIELDS - expandable */
.blue-section{border-top:2px solid var(--blue-light);padding:14px 18px;display:none;background:#fafcff}
.blue-section.open{display:block}
.blue-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:12px}
.blue-field .bf-label{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.blue-field .bf-value{font-size:13px;color:var(--gray-700);line-height:1.5}
.toggle-blue{background:var(--blue-light);color:var(--blue-dark);border:none;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.toggle-blue:hover{background:#bfdbfe}
/* APPROVAL STRIP */
.approval-strip{display:flex;align-items:center;gap:10px;padding:10px 18px;background:linear-gradient(90deg,#fffbeb,#fffde8);border-top:1px solid #fde68a;flex-wrap:wrap}
.approval-strip .strip-label{font-size:12px;color:#92400e;font-weight:700;flex:1;letter-spacing:.1px}
.btn-approve{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px;box-shadow:0 2px 6px rgba(22,163,74,.35)}
.btn-approve:hover{background:linear-gradient(135deg,#15803d,#166534);transform:translateY(-1px);box-shadow:0 4px 10px rgba(22,163,74,.4)}
.btn-reject{background:#fff;color:var(--red);border:2px solid var(--red);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.btn-reject:hover{background:var(--red-light);transform:translateY(-1px)}
.btn-reopen{background:#fff;color:var(--gray-500);border:2px solid var(--gray-300);padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:.15s}
.btn-reopen:hover{border-color:var(--orange);color:var(--orange)}
/* PHOTOS */
.photos-section{padding:12px 16px;border-top:1px solid var(--gray-100)}
.photos-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-thumb{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--gray-200);cursor:pointer}
.photo-add{width:80px;height:80px;border:2px dashed var(--gray-300);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-500);font-size:11px;gap:4px;transition:.15s}
.photo-add:hover{border-color:var(--blue);color:var(--blue)}
.card-actions{display:flex;gap:6px;flex-shrink:0}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:800px;box-shadow:var(--shadow-lg);margin:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:12px}
.modal-header h3{font-size:16px;font-weight:700;flex:1}
.modal-body{padding:24px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:600;color:var(--gray-500)}
.form-group label.red-label{color:var(--red)}
.form-group label.blue-label{color:var(--blue)}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:13px;font-family:inherit;transition:.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.form-group textarea{resize:vertical;min-height:80px}
.segment-picker{display:flex;flex-wrap:wrap;gap:8px;padding:6px 0}
.seg-badge{cursor:pointer;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid #ddd;background:#f0f0f0;color:#999;transition:all .15s;user-select:none}
.seg-badge.selected[data-seg="Instalator"]{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.seg-badge.selected[data-seg="Client final"]{background:#6b35a0;color:#fff;border-color:#6b35a0}
.seg-badge.selected[data-seg="Juridic"]{background:#7B3F00;color:#fff;border-color:#7B3F00}
.seg-badge.selected[data-seg="Proiectanti"],.seg-badge.selected[data-seg="Dezvoltatori"],.seg-badge.selected[data-seg="Arhitecti"],.seg-badge.selected[data-seg="Servisant"]{background:#e8edf5;color:#1a3a6b;border-color:#1a3a6b}
.tip-badge{cursor:pointer;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid #ddd;background:#f0f0f0;color:#999;transition:all .15s;user-select:none}
.tip-badge.selected{background:#0e7c5a;color:#fff;border-color:#0e7c5a}
.section-divider{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin:4px 0}
.section-divider span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.section-divider::before,.section-divider::after{content:"";flex:1;height:1px;background:var(--gray-200)}
.section-divider.red-div span{color:var(--red)}.section-divider.red-div::before,.section-divider.red-div::after{background:var(--red-light)}
.section-divider.blue-div span{color:var(--blue)}.section-divider.blue-div::before,.section-divider.blue-div::after{background:var(--blue-light)}
/* REPORT */
#report-view{padding:0}
.report-header{background:linear-gradient(135deg,#1a3a6b,#1a56db);color:#fff;padding:24px 32px;border-radius:var(--radius);margin-bottom:24px}
.report-header h2{font-size:22px;font-weight:700;margin-bottom:4px}
.report-header p{opacity:.8;font-size:14px}
.report-section{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.report-section h3{padding:12px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);font-size:14px;font-weight:700}
/* USER PICKER */
#user-select{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;outline:none}
#user-select option{color:var(--gray-900);background:#fff}
/* SYNC */
#sync-indicator{font-size:11px;padding:3px 10px;border-radius:12px;white-space:nowrap;display:none}
.sync-saving{background:#fef9c3;color:#854d0e}
.sync-loading{background:#dbeafe;color:#1e40af}
.sync-ok{background:#dcfce7;color:#166534}
.sync-error{background:#fee2e2;color:#991b1b}
/* UTILS */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-500)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-row select{padding:6px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:13px;background:#fff}
.img-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
@media print{#sidebar,#header nav,#header .user-area,.card-actions,.toggle-blue,.photo-add{display:none!important}#main{display:block}.blue-section{display:block!important}#content{padding:0}}
/* ── MOBILE MENU BUTTON ── */
#mobile-menu-btn{display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;flex-shrink:0}
#mobile-menu-btn:hover{background:rgba(255,255,255,.25)}
/* ── SIDEBAR OVERLAY ── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:98;backdrop-filter:blur(2px)}
#sidebar-overlay.open{display:block}
/* ── BOTTOM NAV ── */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#0d2456,#1a56db);border-top:1px solid rgba(255,255,255,.15);z-index:97;padding:0;box-shadow:0 -4px 16px rgba(13,36,86,.3)}
#bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;background:transparent;border:none;color:rgba(255,255,255,.65);font-size:10px;font-weight:600;cursor:pointer;transition:.15s;border-top:2px solid transparent}
#bottom-nav button.active{color:#fff;border-top-color:#7dd3fc}
#bottom-nav button .lucide{width:20px;height:20px}
/* ── RESPONSIVE ── */
@media(max-width:768px){
  #header{padding:0 12px;height:56px;gap:10px}
  #header .logo{font-size:16px}
  #header nav{display:none}
  #mobile-menu-btn{display:flex}

const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbztIBkVO51QPly_kke1M9_9k7cVZ2GG4WvWICzBbxAK-Nyq2NbYAosTxJoxoEA7WCWp/exec';
let API_URL = localStorage.getItem('romstal_api_url') || DEFAULT_API_URL;

// Deduplicare după _id și după conținut (Denumire+Solicitant+Buget)
// Acoperă cazul în care utilizatori diferiți au creat copii cu _id-uri diferite
function deduplicateWeeks(weeks) {
  return weeks.map(w => {
    const seenIds = new Set();
    const seenContent = new Set();
    const rows = (w.rows || []).filter(r => {
      // 1. Dedup după _id
      if (r._id) {
        if (seenIds.has(r._id)) return false;
        seenIds.add(r._id);
      }
      // 2. Dedup după conținut (același proiect creat de utilizatori diferiți)
      const name  = (r['Denumire Proiect'] || r['Denumire'] || '').trim().toLowerCase();
      const sold  = (r['Solicitant'] || '').trim().toLowerCase();
      const buget = (r['Buget (euro fara TVA)'] || '').toString().trim();
      if (name) {
        const key = name + '||' + sold + '||' + buget;
        if (seenContent.has(key)) return false;
        seenContent.add(key);
      }
      return true;
    });
    return {...w, rows};
  });
}

let _pushDebounceTimer = null;
function schedulePush() {
  clearTimeout(_pushDebounceTimer);
  _pushDebounceTimer = setTimeout(() => { _pushDebounceTimer = null; pushToAPI(); }, 2000);
}

function saveDB() {
  localStorage.setItem('romstal_mkt_v2', JSON.stringify({weeks: state.weeks, users: state.users, deletedIds: state.deletedIds}));
  if (API_URL) schedulePush();
}

function loadDB() {
  const raw = localStorage.getItem('romstal_mkt_v2');
  if (raw) {
    const db = JSON.parse(raw);
    const rawWeeks = (db.weeks || []).map(w => ({...w, rows: (w.rows||[]).map(r => {
      const roi = r['ROI'] || '';
      if (roi.startsWith('=') || roi.startsWith('#')) return {...r, 'ROI': ''};
      return r;
    })}));
    state.weeks = deduplicateWeeks(rawWeeks);
    state.users = db.users || ['Admin','Marketing','Finante'];
    state.deletedIds = db.deletedIds || [];
    migrateWeek2529mai();
    sortWeeksByDate();
  } else {
    state.weeks = JSON.parse(JSON.stringify(INITIAL_DATA));
    state.users = ['Admin','Marketing','Finante'];
    state.weeks.forEach(w => {
      w.id = w.id || genId();
      w.rows.forEach(r => {
        r._id = r._id || genId();
        r._photos = r._photos || [];
        r._createdBy = r._createdBy || 'Import Excel';
        r._createdAt = r._createdAt || new Date().toISOString();
      });
    });
    sortWeeksByDate();
    saveDB();
  }
}

function migrateWeek2529mai() {
  const TARGET = 'Saptamana 25-29 mai 2026';
  const SOURCE = 'Saptamana  18-22 mai';
  const weekIdx = state.weeks.findIndex(w => w.week === TARGET);
  if (weekIdx === -1) return;
  const week = state.weeks[weekIdx];
  const firstRow = week.rows[0];
  if (!firstRow || firstRow._copiedFrom === SOURCE) return;
  const sourceData = INITIAL_DATA.find(w => w.week === SOURCE);
  if (!sourceData) return;
  const now = new Date().toISOString();
  week.rows = sourceData.rows.map(r => ({
    ...r,
    _id: genId(),
    _photos: r._photos ? [...r._photos] : [],
    _copiedFrom: SOURCE,
    _copiedAt: now
  }));
  if (!state.weeks.some(w => w.week === SOURCE)) {
    const srcWeek = JSON.parse(JSON.stringify(sourceData));
    srcWeek.id = srcWeek.id || genId();
    srcWeek.rows.forEach(r => { r._id = r._id || genId(); r._photos = r._photos || []; });
    state.weeks.splice(weekIdx + 1, 0, srcWeek);
  }
  saveDB();
}

function setSyncStatus(status) {
  const cfg = {
    saving:  {cls:'sync-saving',  txt:'⏫ Salvez...'},
    loading: {cls:'sync-loading', txt:'⏬ Sincronizez...'},
    ok:      {cls:'sync-ok',      txt:'✅ Sincronizat'},
    error:   {cls:'sync-error',   txt:'⚠️ Eroare sync'}
  };
  ['sync-indicator','sync-indicator-iframe'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = cfg[status]?.cls || '';
    el.textContent = cfg[status]?.txt || '';
    el.style.display = status ? 'inline-block' : 'none';
  });
  if (status === 'ok') setTimeout(() => setSyncStatus(''), 3000);
}

function normalizeRow(r) {
  const {_photos, ...rest} = r;
  // Replace Excel formula strings in ROI with computed numeric value
  const roi = rest['ROI'] || '';
  if (roi.startsWith('=') || roi.startsWith('#')) {
    rest['ROI'] = computeROI(rest) || '';
  }
  return rest;
}

function stripPhotosForSync(weeks) {
  const currentYear = new Date().getFullYear();
  // Sortăm cel mai nou primul, filtrăm după an, normalizăm rândurile
  const sorted = weeks
    .filter(w => { try { return parseWeekDate(w.week).getFullYear() === currentYear; } catch(e) { return false; } })
    .sort((a, b) => parseWeekDate(b.week) - parseWeekDate(a.week))
    .map(w => ({ ...w, rows: w.rows.map(normalizeRow) }));
  // Fiecare _id apare o singură dată — în săptămâna cea mai recentă
  // Elimină duplicatele cross-săptămână din foaia Proiecte fără redeploy AS
  const seenIds = new Set();
  return sorted.map(w => ({
    ...w,
    rows: w.rows.filter(r => {
      if (!r._id) return true;
      if (seenIds.has(r._id)) return false;
      seenIds.add(r._id);
      return true;
    })
  }));
}

function computeBugetSummary() {
  const currentYear = new Date().getFullYear();
  const BUGET_ANUAL = 3400000;
  const yearWeeks = state.weeks.filter(w => parseWeekDate(w.week).getFullYear() === currentYear);
  const allRows = yearWeeks.flatMap(w => w.rows);
  const totalSolicitat = allRows.reduce((s, r) => s + parseBuget(r['Buget (euro fara TVA)']), 0);
  const bugetAprobat   = allRows.filter(r => isAprobat(rowStatus(r))).reduce((s, r) => s + parseBuget(r['Buget (euro fara TVA)']), 0);
  const bugetInAnaliza = allRows.filter(r => !isAprobat(rowStatus(r)) && !isRespins(rowStatus(r))).reduce((s, r) => s + parseBuget(r['Buget (euro fara TVA)']), 0);
  const nrAprobate = allRows.filter(r => isAprobat(rowStatus(r))).length;
  const disponibil = Math.max(BUGET_ANUAL - totalSolicitat, 0);
  const pctAnual   = Math.min(Math.round(totalSolicitat / BUGET_ANUAL * 100), 100);
  const pctAprobare = allRows.length > 0 ? Math.round(nrAprobate / allRows.length * 100) : 0;
  return {
    an: currentYear,
    bugetAnualAlocat: BUGET_ANUAL,
    totalSolicitat,
    bugetAprobat,
    bugetInAnaliza,
    disponibil,
    pctDinBugetAnual: pctAnual,
    nrProiecteTotal: allRows.length,
    nrProiecteAprobate: nrAprobate,
    rataAprobare: pctAprobare,
    dataActualizare: new Date().toISOString()
  };
}

async function pushToAPI() {
  if (!API_URL) return false;
  setSyncStatus('saving');
  try {
    const weeksNoPhotos = stripPhotosForSync(state.weeks);
    const bugetSummary = computeBugetSummary();
    const resp = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({weeks: weeksNoPhotos, users: state.users, bugetSummary, deletedIds: state.deletedIds || []})
    });
    const result = await resp.json();
    if (result.ok || result.status === 'ok') {
      setSyncStatus('ok');
      return true;
    } else {
      setSyncStatus('error');
      const errMsg = result.error || result.message || JSON.stringify(result);
      showToast('❌ Eroare Apps Script: ' + errMsg);
      console.error('Apps Script error:', result);
      return false;
    }
  } catch(e) {
    setSyncStatus('error');
    showToast('❌ Nu s-a putut conecta la Google Sheets');
    return false;
  }
}

async function pullFromAPI() {
  if (!API_URL) return false;
  setSyncStatus('loading');
  try {
    const resp = await fetch(API_URL + '?t=' + Date.now());
    const data = await resp.json();
    if (data.error) { setSyncStatus('error'); return false; }

    // Preia tombstone-urile server-side și le combină cu cele locale
    // Fără asta, alte calculatoare care nu au șters proiectul îl re-adaugă în Sheets
    if (data.deletedIds && data.deletedIds.length > 0) {
      const merged = [...new Set([...(state.deletedIds || []), ...data.deletedIds])];
      state.deletedIds = merged;
    }
    const allDeletedSet = new Set(state.deletedIds || []);

    if (data.weeks && data.weeks.length > 0) {
      const currentYear = new Date().getFullYear();
      const remoteWeeks = data.weeks
        .filter(w => { try { return parseWeekDate(w.week).getFullYear() === currentYear; } catch(e) { return false; } })
        .map(w => ({...w, rows: w.rows.map(r => {
          const roi = r['ROI'] || '';
          return roi.startsWith('=') || roi.startsWith('#') ? {...r, 'ROI': computeROI(r) || ''} : r;
        })}));
      if (remoteWeeks.length > 0) {
        const localMap = {};
        for (const w of state.weeks) localMap[w.week] = w;

        for (const rw of remoteWeeks) {
          const lw = localMap[rw.week];
          if (!lw) {
            localMap[rw.week] = rw;
          } else {
            const localRowById = {};
            for (const r of (lw.rows || [])) {
              if (r._id) localRowById[r._id] = r;
            }
            const remoteIds = new Set((rw.rows || []).map(r => r._id).filter(Boolean));
            const mergedRemote = (rw.rows || [])
              .filter(r => !r._id || !allDeletedSet.has(r._id))
              .map(r => {
                const local = r._id ? localRowById[r._id] : null;
                if (!local) return {...r, _photos: []};

                // Baza: versiunea cu timestamp general mai nou
                const remoteTs = r._updatedAt || r._createdAt || '';
                const localTs  = local._updatedAt || local._createdAt || '';
                const base = localTs > remoteTs ? local : r;

                // Status: câștigă versiunea cu _statusChangedAt mai nou
                // Dacă local are _statusChangedAt și remote nu, local câștigă statusul
                const remoteStatusTs = r._statusChangedAt || '';
                const localStatusTs  = local._statusChangedAt || '';
                let finalStatus = base['Status'];
                let finalAprobare = base['Aprobare (notite Andu din sedinta cu dl Perini)'];
                let finalStatusChangedAt = base._statusChangedAt;
                let finalStatusChangedBy = base._statusChangedBy;
                if (localStatusTs > remoteStatusTs) {
                  finalStatus   = local['Status'];
                  finalAprobare = local['Aprobare (notite Andu din sedinta cu dl Perini)'];
                  finalStatusChangedAt = local._statusChangedAt;
                  finalStatusChangedBy = local._statusChangedBy;
                } else if (remoteStatusTs > localStatusTs) {
                  finalStatus   = r['Status'];
                  finalAprobare = r['Aprobare (notite Andu din sedinta cu dl Perini)'];
                  finalStatusChangedAt = r._statusChangedAt;
                  finalStatusChangedBy = r._statusChangedBy;
                }

                return {
                  ...base,
                  'Status': finalStatus,
                  'Aprobare (notite Andu din sedinta cu dl Perini)': finalAprobare,
                  _statusChangedAt: finalStatusChangedAt,
                  _statusChangedBy: finalStatusChangedBy,
                  _photos: local._photos || []
                };
              });
            // Rânduri locale care nu sunt în remote — dar nu cele șterse (nici local nici server-side)
            const localOnly = (lw.rows || []).filter(r =>
              (!r._id || !remoteIds.has(r._id)) && (!r._id || !allDeletedSet.has(r._id))
            );
            const combined = {...lw, rows: [...mergedRemote, ...localOnly]};
            localMap[rw.week] = deduplicateWeeks([combined])[0];
          }
        }
        state.weeks = Object.values(localMap);
      }
      if (data.users && data.users.length > 0) state.users = data.users;
      localStorage.setItem('romstal_mkt_v2', JSON.stringify({weeks: state.weeks, users: state.users, deletedIds: state.deletedIds}));
    }
    setSyncStatus('ok');
    return true;
  } catch(e) { setSyncStatus('error'); return false; }
}

async function manualSync() {
  if (!API_URL) { showToast('⚠️ Configurează URL-ul Google Sheets în Setări'); showView('settings'); return; }
  const pushed = await pushToAPI();
  if (!pushed) return;
  const ok = await pullFromAPI();
  if (ok) { buildSidebar(); renderProjects(); showToast('✅ Date salvate și sincronizate cu Google Sheets'); }
}

  if (!API_URL) return;
  if (!confirm('Ești sigur? Aceasta va șterge tot din Google Sheets și va rescrie cu datele din browserul tău.\n\nAsigură-te că browserul tău are datele corecte înainte de a continua.')) return;
  setSyncStatus('saving');
  try {
    const weeksNoPhotos = stripPhotosForSync(state.weeks);
    const bugetSummary = computeBugetSummary();
    const resp = await fetch(API_URL, {
      method: 'POST',

    });

}

  lines.push('=== DATE LOCALE (browser) ===');

    if (data.error) {
      lines.push('❌ Eroare de la Apps Script: ' + data.error);

      const sheetsWeeks = (data.weeks || []).length;
      const sheetsProjects = (data.weeks || []).reduce((s, w) => s + (w.rows || []).length, 0);
      lines.push(`✅ Răspuns primit OK`);
      lines.push(`Săptămâni în Sheets: ${sheetsWeeks}  |  Proiecte în Sheets: ${sheetsProjects}`);
      if (sheetsProjects < localProjects) {
        lines.push(`⚠️ Sheets are ${localProjects - sheetsProjects} proiecte MAI PUȚIN decât browserul — push-ul nu a scris datele!`);
      } else if (sheetsProjects === localProjects) {
        lines.push('✅ Numărul de proiecte coincide — datele sunt sincronizate.');
      }
    }
  } catch(e) {
    lines.push('❌ Eroare rețea la GET: ' + e.message);
  }

  // Test POST
  lines.push('\n=== TEST SCRIERE în Google Sheets (POST) ===');
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({weeks: state.weeks, users: state.users})
    });
    const result = await resp.json();
    if (result.status === 'ok') {
      lines.push(`✅ POST reușit — ${result.weeks} săptămâni, ${result.proiecte !== undefined ? result.proiecte + ' proiecte' : ''} scrise în Sheets`);
      if (result.proiecte !== undefined && result.proiecte < localProjects) {
        lines.push(`⚠️ Sheets a scris ${result.proiecte} proiecte dar browserul are ${localProjects} — verifică scriptul!`);
      }
    } else if (result.error) {
      lines.push('❌ Apps Script a returnat eroare: ' + result.error);
    } else {
      lines.push('⚠️ Răspuns neașteptat: ' + JSON.stringify(result));
    }
  } catch(e) {
    lines.push('❌ Eroare rețea la POST: ' + e.message);
    lines.push('   Posibil: URL greșit, script nedeployed, sau problemă CORS');
  }

  lines.push('\n=== CONCLUZIE ===');
  lines.push('Dacă POST e OK dar proiectele nu apar în Sheets:');
  lines.push('→ Verifică tab-ul "Proiecte" din spreadsheet (nu "Sheet1")');
  lines.push('→ Asigură-te că ai dat Deploy > New Version după ce ai lipit codul nou');

  box.textContent = lines.join('\n');
}

// ─── WEEK DATE PARSING & SORTING ────────────────────────────────────────────
const RO_MONTH_MAP = {
  'ian':0,'ianuarie':0,'feb':1,'februarie':1,'mar':2,'martie':2,
  'apr':3,'aprilie':3,'mai':4,'iun':5,'iunie':5,'iul':6,'iulie':6,
  'aug':7,'august':7,'sep':8,'septembrie':8,'oct':9,'octombrie':9,
  'nov':10,'noiembrie':10,'dec':11,'decembrie':11
};
function parseWeekDate(name) {
  const s = (name || '').toLowerCase();
  const yearM = s.match(/\b(20\d\d)\b/);
  const yr = yearM ? +yearM[1] : null;
  let mo = null;
  for (const k of Object.keys(RO_MONTH_MAP).sort((a,b) => b.length - a.length)) {
    if (new RegExp('\\b' + k + '\\b').test(s)) { mo = RO_MONTH_MAP[k]; break; }
  }
  if (mo === null) return new Date(0);
  const dayM = s.match(/\b(\d{1,2})\b/);
  const day = dayM ? +dayM[1] : 1;
  return new Date(yr || (mo >= 9 ? 2025 : 2026), mo, day);
}
function sortWeeksByDate() {
  state.weeks.sort((a, b) => parseWeekDate(b.week) - parseWeekDate(a.week));
}

// ─── AUTO WEEK ───────────────────────────────────────────────────────────────
const RO_MONTHS = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];

function currentWeekName() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,...6=Sat
  const diffMon = (day === 0) ? -6 : 1 - day;
  const mon = new Date(now); mon.setDate(now.getDate() + diffMon);
  const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
  const m = mon.getMonth();
  const y = mon.getFullYear();
  if (mon.getMonth() === fri.getMonth()) {
    return `Saptamana ${mon.getDate()}-${fri.getDate()} ${RO_MONTHS[m]} ${y}`;
  }
  return `Saptamana ${mon.getDate()} ${RO_MONTHS[mon.getMonth()]}-${fri.getDate()} ${RO_MONTHS[fri.getMonth()]} ${y}`;
}

function ensureCurrentWeek() {
  const name = currentWeekName();
  const exists = state.weeks.some(w => w.week === name);
  if (!exists) {
    // Copy all projects from the most recent previous week (skip current if already added)
    const prevWeek = state.weeks.find(w => w.week !== name) || state.weeks[0];
    const copiedRows = prevWeek ? prevWeek.rows.map(r => ({
      ...r,
      _id: r._id || genId(),
      _photos: r._photos ? [...r._photos] : [],
      _copiedFrom: prevWeek.week,
      _copiedAt: new Date().toISOString()
    })) : [];
    state.weeks.unshift({ id: genId(), week: name, rows: copiedRows });
    saveDB();
    return { name, count: copiedRows.length };
  }
  return null;
}

function isRespins(rawStatus) {
  const s = (rawStatus || '').toLowerCase().trim();
  return s === 'respins' || s.startsWith('respins ') || s === 'nu';
}
function rowStatus(r) {
  const s = r['Status'] || '';
  const a = r['Aprobare (notite Andu din sedinta cu dl Perini)'] || '';

  if (isAprobat(s) || isRespins(s)) return s;

}

];

function getField(row, fieldDef) {
  return row[fieldDef.key] || (fieldDef.alt ? row[fieldDef.alt] : '') || '';
}

const MARJA_MEDIE = 0.27;

function parseBuget(val) {
  if (!val) return 0;
  // Strip leading = (Excel formula marker), spaces, normalize decimal separator
  let s = String(val).trim().replace(/^=/, '').replace(/\s/g, '').replace(',', '.');
  // Plain number
  const plain = parseFloat(s);
  if (!isNaN(plain) && String(plain) === s) return plain;
  // Safe arithmetic expression: only digits, . + - * / ( )
  if (/^[\d.()+\-*/ ]+$/.test(s)) {
    try {
      const result = Function('"use strict"; return (' + s + ')')();
      if (typeof result === 'number' && isFinite(result)) return Math.round(result * 100) / 100;
    } catch(e) {}
  }
  // Fallback: take first numeric token
  const m = s.match(/[\d]+([.,][\d]+)?/);
  return m ? parseFloat(m[0].replace(',', '.')) : 0;
}

function formatBugetVal(val) {
  const n = parseBuget(val);
  if (!n) return val || '—';
  const computed = String(val || '').trim().replace(/\s/g, '');
  const isExpr = computed !== String(n) && /[+\-*/()]/.test(computed);
  return isExpr ? formatBuget(n) + ' €' : (val || '—');
}

function computeROI(row) {
  // If a numeric/percent value is stored, use it directly
  const stored = (row['ROI'] || '').trim();
  if (stored && !stored.startsWith('=') && !stored.startsWith('#')) {
    const n = parseFloat(stored.replace(',', '.').replace('%', ''));
    if (!isNaN(n)) return stored.includes('%') ? stored : (n * 100).toFixed(1) + '%';
  }
  // Calculate from available fields
  const buget = parseBuget(row['Buget (euro fara TVA)']);
  const vanzare = parseBuget(row['obiectiv vanzare suplimentara']);
  if (!buget || !vanzare) return null;
  const roi = ((vanzare * MARJA_MEDIE) - buget) / buget;
  const pct = (roi * 100).toFixed(1);
  return (roi >= 0 ? '+' : '') + pct + '%';
}

function renderCard(row, idx) {
  const id = row._id;
  const denumire = getField(row, RED_FIELDS[0]);
  const status = getField(row, RED_FIELDS[8]);
  const categorie = row['Categorie proiect'] || '';
  const photos = row._photos || [];

  const isApproved = isAprobat(status);
  const isRejected = isRespins(status);
  const isPending  = !isApproved && !isRejected;

  const statusBadge = isPending ? getStatusBadge(status) : '';

  const FIELD_META = {
    'Perioada':                      {icon:'calendar',     bg:'#eff6ff', color:'#3b82f6'},
    'Buget (euro fara TVA)':         {icon:'euro',          bg:'#f0fdf4', color:'#16a34a'},
    'Segment':                       {icon:'users',         bg:'#f5f3ff', color:'#7c3aed'},
    'Tip obiectoiv':                 {icon:'target',        bg:'#fff7ed', color:'#ea580c'},
    'nr participanti':               {icon:'user-check',    bg:'#eff6ff', color:'#2563eb'},
    'obiectiv vanzare suplimentara': {icon:'trending-up',   bg:'#ecfdf5', color:'#059669'},
    'ROI':                           {icon:'percent',       bg:'#fefce8', color:'#ca8a04'},
  };
  const roiValue = computeROI(row);
  const redHtml = RED_FIELDS.slice(1,8).map(f => {
    let raw = f.key === 'ROI' ? (roiValue || '') : getField(row, f);
    if (!raw) return '';
    let display = raw;
    let valStyle = '';
    if (f.key === 'Buget (euro fara TVA)') {
      display = formatBugetVal(raw);
    } else if (f.key === 'ROI' && roiValue) {
      valStyle = roiValue.startsWith('+') ? 'color:var(--green)' : 'color:var(--red)';
    }
    const m = FIELD_META[f.key] || {icon:'info', bg:'#f1f5f9', color:'#64748b'};
    return `<div class="red-field">
      <div class="rf-icon" style="background:${m.bg}"><i data-lucide="${m.icon}" class="lucide" style="color:${m.color}"></i></div>
      <div class="rf-body"><div class="rf-label">${esc(f.label)}</div><div class="rf-value" style="${valStyle}">${esc(display)}</div></div>
    </div>`;
  }).filter(Boolean).join('');

  const blueHtml = BLUE_FIELDS.map(f => {
    const v = getField(row, f);
    if (!v) return '';
    return `<div class="blue-field"><div class="bf-label">${esc(f.label)}</div><div class="bf-value">${esc(v)}</div></div>`;
  }).filter(Boolean).join('');

  const photosHtml = `
    <div class="photos-section" id="photos-${id}">
      <div style="font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px"><i data-lucide="camera" class="lucide"></i> Fotografii (${photos.length})</div>
      <div class="photos-grid">
        ${photos.map((p,i) => `<img src="${p.data}" class="photo-thumb" onclick="showLightbox('${id}',${i})" title="${esc(p.name||'')}">`).join('')}
        <label class="photo-add" title="Adaugă fotografie">
          <i data-lucide="image-plus" class="lucide lucide-lg"></i>
          <span>Foto</span>
          <input type="file" accept="image/*" multiple style="display:none" onchange="addPhotos('${id}',this)">
        </label>
      </div>
    </div>`;

  const approvalStrip = isPending ? `
    <div class="approval-strip">
      <span class="strip-label"><i data-lucide="clock" class="lucide"></i> În așteptarea aprobării</span>
      <button class="btn-approve" onclick="setProjectStatus('${id}','Aprobat')"><i data-lucide="check" class="lucide"></i> Aprobă</button>
      <button class="btn-reject"  onclick="setProjectStatus('${id}','Respins')"><i data-lucide="x" class="lucide"></i> Respinge</button>
    </div>` : isRejected ? `
    <div class="approval-strip" style="background:transparent;border-color:#e5e7eb">
      <span class="badge badge-red" style="font-size:12px;padding:4px 10px"><i data-lucide="x-circle" class="lucide"></i> Respins</span>
    </div>` : `
    <div class="approval-strip" style="background:transparent;border-color:#e5e7eb">
      <span class="badge badge-green" style="font-size:12px;padding:4px 10px"><i data-lucide="check-circle" class="lucide"></i> Aprobat</span>
    </div>`;

  const statusAttr = isApproved ? 'approved' : isRejected ? 'rejected' : 'pending';
  return `
  <div class="project-card" id="card-${id}" data-status="${statusAttr}">
    <div class="card-header">
      <div class="card-num"><span class="card-num-hash">#</span><span class="card-num-val">${idx !== undefined ? idx : esc(row['Nr crt']||'?')}</span></div>
      <div class="card-main">
        <div class="card-title">${esc(denumire)}</div>
        <div class="card-tags">
          ${categorie ? `<span class="badge badge-blue">${esc(categorie)}</span>` : ''}
          ${statusBadge}
          ${row['Regiune'] ? `<span class="badge badge-gray">${esc(row['Regiune'])}</span>` : ''}
          ${row['Solicitant'] ? `<span class="badge badge-gray">👤 ${esc(row['Solicitant'])}</span>` : ''}
        </div>
      </div>
      <div class="card-actions">
        <button class="toggle-blue" onclick="toggleBlue(event,'blue-${id}')"><i data-lucide="chevrons-down" class="lucide"></i> Detalii</button>
        ${isPending ? `<button class="btn btn-ghost btn-sm" onclick="editProject('${id}')"><i data-lucide="pencil" class="lucide"></i></button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="deleteProject('${id}')"><i data-lucide="trash-2" class="lucide"></i></button>
      </div>
    </div>
    ${approvalStrip}
    ${redHtml ? `<div class="red-fields">${redHtml}</div>` : ''}
    <div class="blue-section" id="blue-${id}">
      <div class="blue-fields">${blueHtml}</div>
    </div>
    ${photosHtml}
  </div>`;
}

function getStatusBadge(status) {
  if (!status) return '';
  const sl = status.toLowerCase();
  let cls = 'badge-gray';
  if (isAprobat(status)) cls = 'badge-green';
  else if (isRespins(status)) cls = 'badge-red';
  else if (sl.includes('anali') || sl.includes('pending')) cls = 'badge-orange';
  return `<span class="badge ${cls}">${esc(status)}</span>`;
}

function findRow(id) {
  for (const w of state.weeks) {
    const r = w.rows.find(r => r._id === id);
    if (r) return r;
  }
  return null;
}

function addPhotos(rowId, input) {
  const row = findRow(rowId);
  if (!row) return;
  const files = Array.from(input.files);
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      if (!row._photos) row._photos = [];
      row._photos.push({data: e.target.result, name: file.name});
      done++;
      if (done === files.length) { saveDB(); renderProjects(); }
    };
    reader.readAsDataURL(file);
  });
}

function showLightbox(rowId, idx) {
  const row = findRow(rowId);
  if (!row || !row._photos[idx]) return;
  document.getElementById('lightbox-img').src = row._photos[idx].data;
  document.getElementById('lightbox').style.display = 'flex';
}

function openProjectModal(row, week) {
  const isNew = !row;
  document.getElementById('modal-title').textContent = isNew ? 'Proiect Nou' : 'Editare Proiect';

  const allFields = [
    ...RED_FIELDS.map(f => ({...f, color:'red'})),
    ...BLUE_FIELDS.map(f => ({...f, color:'blue'}))
  ];

  // Remove duplicates by key
  const seen = new Set();
  const fields = allFields.filter(f => {
    if (seen.has(f.key)) return false;
    seen.add(f.key);
    return true;
  });

  const cats = [...new Set(state.weeks.flatMap(w => w.rows.map(r => r['Categorie proiect']||'')).filter(Boolean))].sort();

  let body = '<div class="form-grid">';
  body += '<div class="section-divider red-div"><span>🔴 Câmpuri Principale (întotdeauna vizibile)</span></div>';

  fields.forEach(f => {
    const val = row ? (getField(row, f) || '') : '';
    const labelClass = f.color === 'red' ? 'red-label' : 'blue-label';
    if (f.color === 'blue' && f === BLUE_FIELDS[0]) {
      body += '<div class="section-divider blue-div"><span>🔵 Câmpuri Detalii (vizibile la buton)</span></div>';
    }
    const full = ['Obiectiv','Explicatii Obiectiv','Observatii','OBSERVATII SEDINTA'].includes(f.key) ? ' full' : '';
    if (f.key === 'Categorie proiect') {
      body += `<div class="form-group${full}"><label class="${labelClass}">${esc(f.label)}</label>
        <select name="${esc(f.key)}">
          <option value="">-- selectează --</option>
          ${CATEGORIE_OPTIONS.map(c => `<option value="${esc(c)}" ${val===c?'selected':''}>${esc(c)}</option>`).join('')}
          ${val && !CATEGORIE_OPTIONS.includes(val) ? `<option value="${esc(val)}" selected>${esc(val)}</option>` : ''}
        </select></div>`;
    } else if (f.key === 'Status' || f.key === 'Aprobare (notite Andu din sedinta cu dl Perini)') {
      body += `<div class="form-group${full}"><label class="${labelClass}">${esc(f.label)}</label>
        <select name="${esc(f.key)}">
          <option value="">-- selectează --</option>
          ${['Aprobat','Respins','In analiza','In lucru','Finalizat'].map(s => `<option value="${esc(s)}" ${val===s?'selected':''}>${esc(s)}</option>`).join('')}
        </select></div>`;
    } else if (f.key === 'Tip obiectoiv') {
      const selTips = val.split(',').map(s => s.trim()).filter(Boolean);
      body += `<div class="form-group full"><label class="${labelClass}">${esc(f.label)}</label>
        <div class="segment-picker">
          ${TIP_OBIECTIV_OPTIONS.map(t => `<span class="tip-badge${selTips.includes(t)?' selected':''}" data-tip="${esc(t)}" onclick="toggleTipObiectiv(this)">${esc(t)}</span>`).join('')}
        </div>
        <input type="hidden" name="Tip obiectoiv" value="${esc(val)}">
      </div>`;
    } else if (f.key === 'Segment') {
      const selSegs = val.split(',').map(s => s.trim()).filter(Boolean);
      body += `<div class="form-group full"><label class="${labelClass}">${esc(f.label)}</label>
        <div class="segment-picker">
          ${SEGMENT_OPTIONS.map(s => `<span class="seg-badge${selSegs.includes(s)?' selected':''}" data-seg="${esc(s)}" onclick="toggleSegment(this)">${esc(s)}</span>`).join('')}
        </div>
        <input type="hidden" name="Segment" value="${esc(val)}">
      </div>`;
    } else if (f.key === 'ROI') {
      body += `<div class="form-group">
        <label class="${labelClass}">${esc(f.label)}</label>
        <div style="position:relative">
          <input type="text" name="ROI" id="modal-roi-display" readonly
            style="background:#fefce8;color:#ca8a04;font-weight:700;cursor:default;padding-right:36px"
            placeholder="Se calculează automat…" value="${esc(val && !val.startsWith('=') ? val : '')}">
          <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none">%</span>
        </div>
        <span style="font-size:10px;color:#92400e;margin-top:3px;display:block">
          Formula: (Obiectiv Vânzare × 27% − Buget) ÷ Buget
        </span>
      </div>`;
    } else if (full) {
      body += `<div class="form-group full"><label class="${labelClass}">${esc(f.label)}</label><textarea name="${esc(f.key)}">${esc(val)}</textarea></div>`;
    } else {
      body += `<div class="form-group"><label class="${labelClass}">${esc(f.label)}</label><input type="text" name="${esc(f.key)}" value="${esc(val)}"></div>`;
    }
  });

  // Săptămâna curentă se setează automat la salvare

  body += '</div>';
  document.getElementById('modal-body').innerHTML = body;
  if (window.lucide) lucide.createIcons();

  // ── ROI auto-calc ──────────────────────────────────────────────────
  function updateModalROI() {
    const bugetEl = document.querySelector('[name="Buget (euro fara TVA)"]');
    const vanzareEl = document.querySelector('[name="obiectiv vanzare suplimentara"]');
    const roiEl = document.getElementById('modal-roi-display');
    if (!bugetEl || !vanzareEl || !roiEl) return;
    const buget = parseBuget(bugetEl.value);
    const vanzare = parseBuget(vanzareEl.value);
    if (buget > 0 && vanzare > 0) {
      const roi = ((vanzare * MARJA_MEDIE) - buget) / buget;
      roiEl.value = (roi >= 0 ? '+' : '') + (roi * 100).toFixed(1) + '%';
      roiEl.style.color = roi >= 0 ? '#16a34a' : '#dc2626';
    } else {
      roiEl.value = '';
      roiEl.style.color = '#ca8a04';
    }
  }
  document.querySelector('[name="Buget (euro fara TVA)"]')?.addEventListener('input', updateModalROI);
  document.querySelector('[name="obiectiv vanzare suplimentara"]')?.addEventListener('input', updateModalROI);
  updateModalROI();

  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Anulează</button>
    <button class="btn btn-primary" onclick="saveProject('${isNew?'new':row._id}')"><i data-lucide="save" class="lucide"></i> Salvează</button>
  `;

  document.getElementById('modal-overlay').style.display = 'flex';
}

function saveProject(id) {
  const form = document.getElementById('modal-body');
  const inputs = form.querySelectorAll('input,select,textarea');
  const data = {};
  inputs.forEach(inp => {
    if (inp.name && inp.name !== '_week') data[inp.name] = inp.value;
  });
  const weekName = form.querySelector('[name="_week"]')?.value || state.currentWeek;

  if (id === 'new') {
    const week = state.weeks.find(w => w.week === (weekName || state.currentWeek));
    if (!week) return;
    const newRow = {
      ...data,
      'Nr crt': String(week.rows.length + 1),
      _id: genId(),
      _photos: [],
      _createdBy: state.currentUser,
      _createdAt: new Date().toISOString()
    };
    week.rows.push(newRow);
  } else {
    const row = findRow(id);
    if (!row) return;
    Object.assign(row, data);
    row._updatedBy = state.currentUser;
    row._updatedAt = new Date().toISOString();
  }

  saveDB();
  buildSidebar();
  closeModal();
  renderProjects();
}

function setProjectStatus(id, newStatus) {
  const row = findRow(id);
  if (!row) return;
  // Actualizează AMBELE câmpuri de status dacă există, pentru a evita conflicte
  // (rowStatus citește 'Status' primul, deci dacă există trebuie actualizat)
  const hasStatus   = row.hasOwnProperty('Status');
  const hasAprobare = row.hasOwnProperty('Aprobare (notite Andu din sedinta cu dl Perini)');
  if (hasStatus)   row['Status'] = newStatus;
  if (hasAprobare) row['Aprobare (notite Andu din sedinta cu dl Perini)'] = newStatus;
  if (!hasStatus && !hasAprobare) row['Status'] = newStatus;
  row._statusChangedBy = state.currentUser;
  row._statusChangedAt = new Date().toISOString();
  row._updatedAt = new Date().toISOString();

  // Salvare locală (sincronă, rapidă) + push API debounced
  localStorage.setItem('romstal_mkt_v2', JSON.stringify({weeks: state.weeks, users: state.users, deletedIds: state.deletedIds}));
  if (API_URL) schedulePush();

  // Actualizare rapidă DOM: înlocuim doar cardul modificat, fără re-render complet
  const cardEl = document.getElementById('card-' + id);
  if (cardEl) {
    const week = state.weeks.find(w => w.week === state.currentWeek);
    const idx = week ? week.rows.findIndex(r => r._id === id) : -1;
    const tmp = document.createElement('div');
    tmp.innerHTML = renderCard(row, idx >= 0 ? idx + 1 : undefined);
    cardEl.replaceWith(tmp.firstElementChild);
    if (window.lucide) lucide.createIcons();
    _refreshProjectsStats();
  } else {
    renderProjects();
  }
}

function _refreshProjectsStats() {
  const statsEl = document.getElementById('ph-statcards');
  if (!statsEl) return;
  const week = state.weeks.find(w => w.week === state.currentWeek);
  let rows = week ? [...week.rows] : [];
  if (state.search) { const q = state.search.toLowerCase(); rows = rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q))); }
  if (state.filterCategorie) rows = rows.filter(r => (r['Categorie proiect']||'') === state.filterCategorie);
  if (state.filterStatus) rows = rows.filter(r => (r['Status']||r['Aprobare (notite Andu din sedinta cu dl Perini)']||'').toLowerCase().includes(state.filterStatus.toLowerCase()));
  if (state.filterRegiune) rows = rows.filter(r => (r['Regiune']||'') === state.filterRegiune);
  if (state.filterSolicitant) rows = rows.filter(r => (r['Solicitant']||'') === state.filterSolicitant);
  const totalBuget = rows.reduce((s,r) => s + parseBuget(r['Buget (euro fara TVA)']), 0);
  const aprobate = rows.filter(r => isAprobat(rowStatus(r))).length;
  statsEl.innerHTML = `
    <div class="stat-card blue"><div class="sc-icon"><i data-lucide="folder-open" class="lucide"></i></div><div class="sc-body"><div class="val">${rows.length}</div><div class="lbl">Proiecte</div></div></div>
    <div class="stat-card red"><div class="sc-icon"><i data-lucide="euro" class="lucide"></i></div><div class="sc-body"><div class="val">${formatBuget(totalBuget)} €</div><div class="lbl">Buget Total</div></div></div>
    <div class="stat-card green"><div class="sc-icon"><i data-lucide="check-circle" class="lucide"></i></div><div class="sc-body"><div class="val">${aprobate}</div><div class="lbl">Aprobate</div></div></div>
    <div class="stat-card orange"><div class="sc-icon"><i data-lucide="clock" class="lucide"></i></div><div class="sc-body"><div class="val">${rows.length - aprobate}</div><div class="lbl">În Analiză</div></div></div>`;
  if (window.lucide) lucide.createIcons();
}

function deleteProject(id) {
  if (!confirm('Ștergi acest proiect?')) return;
  // Șterge din TOATE săptămânile (același _id poate exista în mai multe săptămâni)
  for (const w of state.weeks) {
    w.rows = w.rows.filter(r => r._id !== id);
  }
  // Tombstone: marchează ID-ul ca șters permanent
  if (id && !state.deletedIds.includes(id)) state.deletedIds.push(id);
  // Salvare locală
  localStorage.setItem('romstal_mkt_v2', JSON.stringify({weeks: state.weeks, users: state.users, deletedIds: state.deletedIds}));
  // Push imediat (nu debounced) — tombstone-ul trebuie să ajungă pe server acum
  if (API_URL) {
    clearTimeout(_pushDebounceTimer);
    _pushDebounceTimer = null;
    pushToAPI();
  }
  buildSidebar();
  renderProjects();
}

function addWeek() {
  const name = prompt('Denumire săptămână (ex: Saptamana 26-30 mai 2026):');
  if (!name || !name.trim()) return;
  state.weeks.unshift({id: genId(), week: name.trim(), rows: []});
  saveDB();
  buildSidebar();
  selectWeek(name.trim());
}

    annualBtn.style.background = 'linear-gradient(135deg,#0d2456,#1a56db)';

function generateAnnualReport() {
  const allRows = state.weeks.flatMap(w => w.rows.map(r => ({...r, _weekName: w.week})));
  const year = new Date().getFullYear();

  const totalBuget = allRows.reduce((s,r) => s + parseBuget(r['Buget (euro fara TVA)']), 0);
  const aprobate = allRows.filter(r => isAprobat(rowStatus(r)));
  const respinse = allRows.filter(r => isRespins(rowStatus(r)));
  const inAnaliza = allRows.length - aprobate.length - respinse.length;
  const aprPct = allRows.length > 0 ? Math.round(aprobate.length/allRows.length*100) : 0;

  const byCat = {};
  allRows.forEach(r => { const c=r['Categorie proiect']||'Necategorizat'; if(!byCat[c]) byCat[c]={count:0,buget:0}; byCat[c].count++; byCat[c].buget+=parseBuget(r['Buget (euro fara TVA)']); });
  const byReg = {};
  allRows.forEach(r => { const g=r['Regiune']||'Nespecificat'; byReg[g]=(byReg[g]||0)+1; });
  const bySeg = {};
  allRows.forEach(r => { (r['Segment']||'Nespecificat').split(',').map(s=>s.trim()).filter(Boolean).forEach(s=>{ bySeg[s]=(bySeg[s]||0)+1; }); });

  const topRows = [...allRows].sort((a,b)=>parseBuget(b['Buget (euro fara TVA)'])-parseBuget(a['Buget (euro fara TVA)'])).slice(0,5);
  const maxTopB = topRows.length ? parseBuget(topRows[0]['Buget (euro fara TVA)']) : 1;

  const CAT_COLORS = ['#1a56db','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777','#65a30d'];
  const REG_COLORS = ['#0891b2','#0e7490','#155e75','#164e63','#1e3a5f','#1a3a6b','#1e40af','#3730a3'];
  const SEG_COLORS = {'Instalator':'#1a3a6b','Client final':'#6b35a0','Juridic':'#7B3F00','Proiectanti':'#0891b2','Dezvoltatori':'#059669','Arhitecti':'#d97706','Servisant':'#dc2626'};

  const statusSegs = [{label:'Aprobate',val:aprobate.length,color:'#16a34a'},{label:'În Analiză',val:inAnaliza,color:'#f59e0b'},{label:'Respinse',val:respinse.length,color:'#dc2626'}].filter(s=>s.val>0);
  let cum=0, conicParts=[];
  statusSegs.forEach(s=>{ const p=allRows.length>0?s.val/allRows.length*100:0; conicParts.push(`${s.color} ${cum.toFixed(1)}% ${(cum+p).toFixed(1)}%`); cum+=p; });

  function hBar(items, maxV, colorFn, labelFn, valFn, fmtFn) {
    return items.map((item,i) => {
      const v=valFn(item), pct=maxV>0?v/maxV*100:0;
      const color=typeof colorFn==='function'?colorFn(item,i):CAT_COLORS[i%CAT_COLORS.length];
      const disp=fmtFn?fmtFn(v):(v>999?formatBuget(v)+' €':v);
      return `<div style="margin-bottom:13px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px">
          <span style="font-weight:600;color:#0f1f3d;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px">${esc(labelFn(item))}</span>
          <span style="color:${color};font-weight:800;white-space:nowrap">${disp}</span>
        </div>
        <div style="background:#f0f2f7;border-radius:8px;height:10px;overflow:hidden">
          <div style="width:${pct.toFixed(1)}%;height:100%;background:${color};border-radius:8px;transition:width .6s ease"></div>
        </div>
        <div style="font-size:10px;color:var(--gray-500);margin-top:2px;font-weight:600">${Math.round(pct)}% din total</div>
      </div>`;
    }).join('');

  const catSorted = Object.entries(byCat).sort((a,b)=>b[1].buget-a[1].buget);

  const weekSummary = state.weeks.map(w => {
    const wRows = w.rows;
    const wBuget = wRows.reduce((s,r) => s+parseBuget(r['Buget (euro fara TVA)']), 0);
    const wAprobate = wRows.filter(r => isAprobat(rowStatus(r))).length;
    const wRespinse = wRows.filter(r => isRespins(rowStatus(r))).length;
    return {name: w.week, count: wRows.length, buget: wBuget, aprobate: wAprobate, respinse: wRespinse};
  });
  const maxWeekBuget = weekSummary.length ? Math.max(...weekSummary.map(w=>w.buget)) : 1;

  const panel = (content) => `<div style="background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(15,31,61,.08)">${content}</div>`;

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">
      ${[

        {icon:'<i data-lucide="banknote" class="lucide lucide-xl"></i>',val:formatBuget(totalBuget)+' €',lbl:'Buget Total',color:'#dc2626',light:'#fef2f2'},
        {icon:'<i data-lucide="check-circle-2" class="lucide lucide-xl"></i>',val:aprobate.length,lbl:'Aprobate',color:'#16a34a',light:'#f0fdf4'},

            ${statusSegs.map(s=>`

      ${panel(`${panelTitle('Distribuție Segmente')}

function generateReport() {
  const sel = document.getElementById('report-week-sel');
  const weekName = sel ? sel.value : state.currentWeek;
  const week = state.weeks.find(w => w.week === weekName);
  const rows = week ? week.rows : [];
  const allRows = state.weeks.flatMap(w => w.rows.map(r => ({...r, _weekName: w.week})));

  const totalBuget = rows.reduce((s,r) => s + parseBuget(r['Buget (euro fara TVA)']), 0);
  const aprobate  = rows.filter(r => isAprobat(rowStatus(r)));
  const respinse  = rows.filter(r => isRespins(rowStatus(r)));
  const inAnaliza = rows.length - aprobate.length - respinse.length;
  const aprPct    = rows.length > 0 ? Math.round(aprobate.length/rows.length*100) : 0;

  const byCat = {};
  rows.forEach(r => { const c=r['Categorie proiect']||'Necategorizat'; if(!byCat[c]) byCat[c]={count:0,buget:0}; byCat[c].count++; byCat[c].buget+=parseBuget(r['Buget (euro fara TVA)']); });

  const byReg = {};
  rows.forEach(r => { const g=r['Regiune']||'Nespecificat'; byReg[g]=(byReg[g]||0)+1; });

  const bySeg = {};
  rows.forEach(r => { (r['Segment']||'Nespecificat').split(',').map(s=>s.trim()).filter(Boolean).forEach(s=>{ bySeg[s]=(bySeg[s]||0)+1; }); });

  const topRows = [...rows].sort((a,b)=>parseBuget(b['Buget (euro fara TVA)'])-parseBuget(a['Buget (euro fara TVA)'])).slice(0,5);
  const maxTopB = topRows.length ? parseBuget(topRows[0]['Buget (euro fara TVA)']) : 1;

  const CAT_COLORS = ['#1a56db','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777','#65a30d'];
  const REG_COLORS = ['#0891b2','#0e7490','#155e75','#164e63','#1e3a5f','#1a3a6b','#1e40af','#3730a3'];
  const SEG_COLORS = {'Instalator':'#1a3a6b','Client final':'#6b35a0','Juridic':'#7B3F00','Proiectanti':'#0891b2','Dezvoltatori':'#059669','Arhitecti':'#d97706','Servisant':'#dc2626'};

  const statusSegs = [{label:'Aprobate',val:aprobate.length,color:'#16a34a'},{label:'În Analiză',val:inAnaliza,color:'#f59e0b'},{label:'Respinse',val:respinse.length,color:'#dc2626'}].filter(s=>s.val>0);
  let cum=0, conicParts=[];
  statusSegs.forEach(s=>{ const p=rows.length>0?s.val/rows.length*100:0; conicParts.push(`${s.color} ${cum.toFixed(1)}% ${(cum+p).toFixed(1)}%`); cum+=p; });

  function hBar(items, maxV, colorFn, labelFn, valFn, fmtFn) {
    return items.map((item,i) => {
      const v=valFn(item), pct=maxV>0?v/maxV*100:0;
      const color=typeof colorFn==='function'?colorFn(item,i):CAT_COLORS[i%CAT_COLORS.length];
      const disp=fmtFn?fmtFn(v):(v>999?formatBuget(v)+' €':v);
      return `<div style="margin-bottom:13px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px">
          <span style="font-weight:600;color:#0f1f3d;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px">${esc(labelFn(item))}</span>
          <span style="color:${color};font-weight:800;white-space:nowrap">${disp}</span>
        </div>
        <div style="background:#f0f2f7;border-radius:8px;height:10px;overflow:hidden">
          <div style="width:${pct.toFixed(1)}%;height:100%;background:${color};border-radius:8px;transition:width .6s ease"></div>
        </div>
        <div style="font-size:10px;color:var(--gray-500);margin-top:2px;font-weight:600">${Math.round(pct)}% din total</div>
      </div>`;
    }).join('');
  }

  const catSorted = Object.entries(byCat).sort((a,b)=>b[1].buget-a[1].buget);
  const regSorted = Object.entries(byReg).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const segSorted = Object.entries(bySeg).sort((a,b)=>b[1]-a[1]);

  const panel = (content) => `<div style="background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(15,31,61,.08)">${content}</div>`;

            ${statusSegs.map(s=>`

              </div>`).join('')}
          </div>
        </div>`)}
      ${panel(`${panelTitle('Buget pe Categorii')}
        ${hBar(catSorted, catSorted.length?catSorted[0][1].buget:1, (_,i)=>CAT_COLORS[i%CAT_COLORS.length], ([c])=>c, ([,v])=>v.buget, v=>formatBuget(v)+' €')}`)}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">

        const den=getField(r,RED_FIELDS[0]);
        return `<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">

function removeUser(name) {
  if (!confirm(`Ștergi utilizatorul "${name}"?`)) return;
  state.users = state.users.filter(u => u !== name);
  if (state.currentUser === name) state.currentUser = state.users[0] || '';
  saveDB(); renderSettings(); renderUserSelect();
}

function addUserSettings() {
  const inp = document.getElementById('new-user-settings');
  const name = inp.value.trim();
  if (name && !state.users.includes(name)) {
    state.users.push(name); saveDB(); inp.value = ''; renderSettings(); renderUserSelect();
  }
}


function exportData() {
  const data = JSON.stringify({weeks: state.weeks, users: state.users, exportedAt: new Date().toISOString(), exportedBy: state.currentUser}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'romstal-mkt-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData() { document.getElementById('import-file').click(); }

function doImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.weeks) { alert('Fișier invalid!'); return; }
      if (!confirm(`Importă ${data.weeks.length} săptămâni? Datele existente vor fi înlocuite.`)) return;
      state.weeks = data.weeks;
      if (data.users) state.users = data.users;
      saveDB();
      buildSidebar();
      if (state.weeks[0]) selectWeek(state.weeks[0].week);
      renderSettings();
      alert('Import realizat cu succes!');
    } catch(err) { alert('Eroare la import: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

function resetToExcel() {
  if (!confirm('Reîncarcă datele originale din Excel? Modificările vor fi pierdute!')) return;
  state.weeks = JSON.parse(JSON.stringify(INITIAL_DATA));
  state.weeks.forEach(w => {
    w.id = w.id || genId();
    w.rows.forEach(r => {
      r._id = r._id || genId();
      r._photos = r._photos || [];
      r._createdBy = 'Import Excel';
      r._createdAt = new Date().toISOString();
    });
  });
  saveDB(); buildSidebar(); selectWeek(state.weeks[0].week);
  alert('Date resetate la valorile din Excel!');
}

function clearAllData() {
